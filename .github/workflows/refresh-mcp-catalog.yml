# Weekly MCP directory refresh — fetches registries and updates committed JSON.
# Requires repo write permissions for the commit step (enable in GitHub Actions settings).

name: Refresh MCP catalog

on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Fetch and build catalog
        run: npm run refresh-data
        env:
          GLAMA_TARGET: 800
          GLAMA_DETAIL_DELAY_MS: 200
          SMITHERY_MAX_PAGES: 60

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/servers-generated.json data/servers-top100.json data/last-updated.json
          git diff --staged --quiet || git commit -m "chore: weekly MCP catalog refresh"
          git push
