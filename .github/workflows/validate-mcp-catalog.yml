# Daily MCP validation — live tools/list against HTTP MCP endpoints (Smithery fallback for auth-only).
# Full registry re-fetch remains weekly (refresh-mcp-catalog.yml).

name: Validate MCP catalog

on:
  schedule:
    - cron: '30 5 * * *'
  workflow_dispatch:
    inputs:
      apply:
        description: 'Apply tool updates to catalog JSON'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'
      probe_endpoints:
        description: 'Deprecated — live validation always probes MCP endpoints'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Validate MCP servers
        run: |
          ARGS=""
          if [ "${{ github.event.inputs.apply || 'true' }}" = "true" ]; then ARGS="$ARGS --apply"; fi
          if [ "${{ github.event.inputs.probe_endpoints || 'false' }}" = "true" ]; then ARGS="$ARGS --probe-endpoints"; fi
          npm run validate-mcp-catalog -- $ARGS
        env:
          MCP_VALIDATE_DELAY_MS: 200
          MCP_VALIDATE_CONCURRENCY: 4

      - name: Commit validation updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/servers-generated.json data/servers-top100.json data/last-updated.json data/mcp-validation-report.json data/mcp-validation-state.json
          git diff --staged --quiet || git commit -m "chore: daily MCP catalog validation"
          git push
